name: FinSight AI — CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:

  # ── Lint & Type Check ────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-dev-${{ hashFiles('requirements/dev.txt') }}

      - name: Install dev dependencies
        run: pip install ruff mypy

      - name: Run ruff (lint + format check)
        run: ruff check . --select E,F,W,I --ignore E501

      - name: Run mypy (type checking)
        run: mypy app/ configs/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true   # non-blocking until stubs are complete


  # ── Unit Tests ───────────────────────────────────────────────────────────────
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ml-${{ matrix.python-version }}-${{ hashFiles('requirements/ml.txt') }}

      - name: Install ML dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Run pytest with coverage
        env:
          OPENAI_API_KEY: "sk-test-dummy"
          ENVIRONMENT: "test"
          DEBUG: "false"
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            -v \
            --tb=short \
            -x

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false


  # ── Docker Build ─────────────────────────────────────────────────────────────
  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f docker/Dockerfile \
            --target runtime \
            -t finsight-ai:ci \
            .

      - name: Smoke test container
        run: |
          docker run --rm -d \
            --name finsight_smoke \
            -e ENVIRONMENT=test \
            -e OPENAI_API_KEY=sk-test-dummy \
            -p 8000:8000 \
            finsight-ai:ci
          sleep 10
          curl -f http://localhost:8000/health
          docker stop finsight_smoke
