version: "3.9"

services:

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runtime
    container_name: finsight_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      # Persist data and model artifacts across container restarts
      - finsight_data:/app/data
      - finsight_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── Streamlit Frontend ───────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runtime
    container_name: finsight_dashboard
    command: >
      streamlit run app/frontend/dashboard.py
        --server.port=8501
        --server.address=0.0.0.0
        --server.headless=true
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_BASE=http://api:8000/api/v1
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  finsight_data:
    driver: local
  finsight_logs:
    driver: local
